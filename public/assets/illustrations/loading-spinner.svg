<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" aria-labelledby="loading-title" role="img">
  <title id="loading-title">Loading spinner</title>
  
  <!-- Light background ring -->
  <circle 
    cx="60" 
    cy="60" 
    r="48" 
    fill="transparent" 
    stroke="#e5e7eb" 
    stroke-width="12" />

  <!-- Spinning colored arc -->
  <circle 
    cx="60" 
    cy="60" 
    r="48" 
    fill="transparent" 
    stroke="#3b82f6" 
    stroke-width="12" 
    stroke-dasharray="90 65" 
    stroke-linecap="round">
    
    <!-- Smooth rotation animation (pure SVG, no external CSS needed) -->
    <animateTransform 
      attributeName="transform" 
      attributeType="XML" 
      type="rotate" 
      from="0 60 60" 
      to="360 60 60" 
      dur="0.75s" 
      repeatCount="indefinite" />
  </circle>
</svg>